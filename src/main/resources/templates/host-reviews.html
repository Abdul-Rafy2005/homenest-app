<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Reviews - HomeNest</title>
    <link rel="stylesheet" href="/css/editorial.css">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="hn-container" style="padding-top: 128px; padding-bottom: 128px;">
        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 48px;">
            <div>
                <h1 class="hn-headline-lg">Reviews for Your Properties</h1>
                <p class="hn-body-lg" style="color: var(--hn-secondary);">See what guests are saying about your stays</p>
            </div>
            <span class="hn-label-sm" th:text="${reviews.size()} + ' reviews'" style="color: var(--hn-secondary);">0 reviews</span>
        </div>

        <div th:if="${reviews == null or reviews.isEmpty()}" style="text-align: center; padding: 128px 0;">
            <h3 class="hn-headline-md" style="color: var(--hn-secondary); margin-bottom: 16px;">No reviews yet</h3>
            <p class="hn-body-lg" style="color: var(--hn-outline);">Your properties haven't received any reviews yet. Reviews appear after guests complete their stays.</p>
        </div>

        <div th:if="${reviews != null and !reviews.isEmpty()}" style="display: grid; gap: 24px;">
            <div th:each="review : ${reviews}" class="hn-content-card">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
                    <div>
                        <h4 class="hn-headline-md" style="margin-bottom: 4px;" th:text="${review.listing.title}">Listing Title</h4>
                        <p class="hn-body-sm" style="color: var(--hn-secondary);" th:text="${review.listing.city}">City</p>
                    </div>
                    <div>
                        <span th:each="i : ${#numbers.sequence(1, review.rating)}" style="color: var(--hn-primary); font-size: 18px;">&#9733;</span>
                        <span th:each="i : ${#numbers.sequence(review.rating + 1, 5)}" style="color: var(--hn-outline-variant); font-size: 18px;">&#9733;</span>
                    </div>
                </div>
                <p class="hn-body-md" style="font-weight: 600; margin-bottom: 4px;" th:text="${review.guest.username}">guest</p>
                <p class="hn-body-sm" style="color: var(--hn-secondary); margin-bottom: 16px;" th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Date</p>
                <p class="hn-body-md" th:text="${review.comment}" th:if="${review.comment}"></p>
                <p class="hn-body-md" style="color: var(--hn-outline); font-style: italic;" th:if="${review.comment == null or #strings.isEmpty(review.comment)}">No comment provided.</p>
            </div>
        </div>

        <div style="margin-top: 64px;">
            <a href="/host/dashboard" class="hn-btn hn-btn-outline">Back to Dashboard</a>
        </div>
    </div>

    <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
