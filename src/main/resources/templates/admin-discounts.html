<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899; --success: #10b981; --warning: #f59e0b; 
            --danger: #ef4444; --info: #06b6d4; --text: #1f2937; --text-light: #6b7280; --bg: #f9fafb; 
            --card-bg: #ffffff; --border: #e5e7eb; 
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: var(--text); 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;
        }
        .page-container { background: var(--bg); border-radius: 24px 24px 0 0; margin-top: 2rem; padding: 2rem; min-height: calc(100vh - 100px); }
        .header-section { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border-radius: 20px; padding: 1.5rem 2rem; margin-bottom: 2rem; box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3); display: flex; justify-content: space-between; align-items: center; }
        .header-section h2 { font-weight: 800; font-size: 2rem; margin: 0; }
        .header-section p { opacity: 0.95; font-size: 1rem; margin: 0.5rem 0 0 0; }
        .section-card { background: var(--card-bg); border: none; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); overflow: hidden; }
        .section-header { background: linear-gradient(90deg, #f9fafb 0%, #ffffff 100%); padding: 1.5rem; border-bottom: 2px solid var(--border); }
        .section-header h5 { font-weight: 700; color: var(--text); margin: 0; font-size: 1.2rem; }
        .badge-ACTIVE { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; font-weight: 600; }
        .badge-EXPIRED { background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%); color: white; font-weight: 600; }
        .badge-SCHEDULED { background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%); color: white; font-weight: 600; }
        .badge-INACTIVE { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; font-weight: 600; }
        .table thead th { background: var(--bg); color: var(--text); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; border: none; padding: 1rem; }
        .table tbody tr { transition: all 0.2s ease; }
        .table tbody tr:hover { background: #f9fafb; }
        .btn-modern { border-radius: 10px; padding: 0.5rem 1rem; font-weight: 600; transition: all 0.3s ease; border: none; font-size: 0.85rem; }
        .btn-warning-modern { background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%); color: white; }
        .btn-warning-modern:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(245, 158, 11, 0.3); color: white; }
        .btn-danger-modern { background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%); color: white; }
        .btn-danger-modern:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(239, 68, 68, 0.3); color: white; }
    </style>
</head>
<body>
<div th:insert="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid">
    <div class="page-container">
        <div class="header-section">
            <div>
                <h2 style="font-weight: 800; font-size: 2rem; margin: 0;"><i class="fa-solid fa-tags me-2"></i>Discount Management</h2>
                <p style="opacity: 0.95; font-size: 1rem; margin: 0.5rem 0 0 0;">Create and manage promotional codes with percentages and date ranges</p>
            </div>
            <a class="btn btn-light" href="/admin/discounts/new" style="border-radius: 10px; padding: 0.6rem 1.2rem; font-weight: 600;"><i class="fa-solid fa-plus me-1"></i> New Discount</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Discounts Table -->
        <div class="section-card">
            <div class="section-header">
                <h5><i class="fa-solid fa-percent me-2" style="color: var(--secondary);"></i>All Discounts</h5>
            </div>
            <div class="p-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Discount %</th>
                                <th>Status</th>
                                <th>Start Date</th>
                                <th>End Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${discounts}" th:if="${!discounts.isEmpty()}" th:with="discount=${item.discount}">
                                <td><small class="text-muted" th:text="${discount.id}">1</small></td>
                                <td><strong style="color: var(--primary);" th:text="${discount.name}">Name</strong></td>
                                <td th:text="${discount.description}">Description</td>
                                <td><span style="color: var(--secondary); font-weight: 700;" th:text="${discount.percentage} + '%'">20%</span></td>
                                <td>
                                    <span class="badge p-2" th:class="'badge p-2 badge-' + ${item.status}" th:text="${item.status}">ACTIVE</span>
                                </td>
                                <td th:text="${discount.startDate != null ? #temporals.format(discount.startDate, 'dd MMM yyyy') : 'N/A'}">-</td>
                                <td th:text="${discount.endDate != null ? #temporals.format(discount.endDate, 'dd MMM yyyy') : 'N/A'}">-</td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/admin/discounts/{id}/edit(id=${discount.id})}" class="btn btn-warning-modern btn-modern"><i class="fa-solid fa-pen-to-square"></i></a>
                                        <a th:href="@{/admin/discounts/{id}/delete(id=${discount.id})}" class="btn btn-danger-modern btn-modern" onclick="return confirm('Are you sure?')"><i class="fa-solid fa-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${discounts.isEmpty()}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="fa-solid fa-inbox fa-2x mb-2"></i>
                                    <p>No discount codes created yet</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
