<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <nav th:fragment="navbar" class="hn-nav">
        <div class="hn-container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div style="display: flex; align-items: center; gap: 48px;">
                <a class="hn-nav-brand" href="/" style="display: flex; align-items: center; gap: 12px;">
                    <img src="/images/homenest_logo.png" alt="HomeNest" style="height: 32px; width: auto; object-fit: contain;">
                    <span style="font-family: 'Playfair Display', Georgia, serif; font-weight: 700; font-size: 20px; letter-spacing: -0.02em; color: var(--hn-on-surface);">HomeNest</span>
                </a>
                <div style="display: flex; gap: 32px; align-items: center;">
                    <a class="hn-nav-link" href="/">Destinations</a>
                    <a class="hn-nav-link" href="/about">About</a>
                    <a class="hn-nav-link" href="/bookings/guest/bookings" sec:authorize="isAuthenticated() and !hasRole('ADMIN') and !hasRole('HOST')">My Bookings</a>
                    <a class="hn-nav-link" href="/host/dashboard" sec:authorize="hasRole('HOST')" style="color: var(--hn-primary);">Host Panel</a>
                    <a class="hn-nav-link" href="/admin/dashboard" sec:authorize="hasRole('ADMIN')" style="color: var(--hn-primary);">Admin Panel</a>
                </div>
            </div>

            <div style="display: flex; align-items: center; gap: 16px;">
                <a class="hn-btn hn-btn-outline" href="/login" sec:authorize="!isAuthenticated()" style="font-size: 12px; padding: 8px 24px;">Sign In</a>
                <a class="hn-btn hn-btn-primary" href="/register" sec:authorize="!isAuthenticated()" style="font-size: 12px; padding: 8px 24px;">Register</a>

                <div sec:authorize="isAuthenticated() and !hasRole('ADMIN') and !hasRole('HOST')" style="display: flex; align-items: center; gap: 16px;">
                    <span class="hn-body-sm" style="color: var(--hn-secondary);" sec:authentication="name">User</span>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="hn-btn hn-btn-outline" style="font-size: 11px; padding: 6px 16px;">Logout</button>
                    </form>
                </div>

                <div sec:authorize="hasRole('HOST')" style="display: flex; align-items: center; gap: 16px;">
                    <span class="hn-body-sm" style="color: var(--hn-secondary);" sec:authentication="name">User</span>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="hn-btn hn-btn-outline" style="font-size: 11px; padding: 6px 16px;">Logout</button>
                    </form>
                </div>

                <div sec:authorize="hasRole('ADMIN')" style="display: flex; align-items: center; gap: 16px;">
                    <span class="hn-body-sm" style="color: var(--hn-secondary);" sec:authentication="name">User</span>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="hn-btn hn-btn-outline" style="font-size: 11px; padding: 6px 16px;">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
