<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <footer th:fragment="footer" class="hn-footer">
        <div class="hn-container">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 48px; flex-wrap: wrap;">
                <div style="max-width: 320px;">
                    <span class="hn-footer-brand">HomeNest</span>
                    <p class="hn-footer-desc">Curating the world's most intentional living spaces for the modern explorer.</p>
                </div>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 48px;">
                    <div>
                        <div class="hn-footer-heading">Discover</div>
                        <ul class="hn-footer-links">
                            <li><a href="/">Destinations</a></li>
                            <li><a href="/about">About</a></li>

                    </div>
                    <div>
                        <div class="hn-footer-heading">Editorial</div>

                            <li><a href="/about">Journal</a></li>
                            <li><a href="/about">Contributors</a></li>
                        </ul>
                    </div>
                    <div>
                        <div class="hn-footer-heading">Support</div>
                        <ul class="hn-footer-links">
                            <li><a href="/about">Help Center</a></li>
                            <li><a href="/about">Contact</a></li>
                        </ul>
                    </div>
                    <div>
                        <div class="hn-footer-heading">Social</div>
                        <ul class="hn-footer-links">
                            <li><a href="#">Instagram</a></li>
                            <li><a href="#">Pinterest</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="hn-footer-bottom">

                <div class="hn-footer-legal">
                    <a href="#">Privacy</a>

</html>
