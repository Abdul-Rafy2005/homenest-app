<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking - HomeNest</title>
    <link rel="stylesheet" href="/css/editorial.css">
</head>
<body>
    <div th:insert="fragments/navbar :: navbar"></div>

    <div class="hn-container" style="padding-top: 64px; padding-bottom: 128px;">
        <div style="max-width: 720px; margin: 0 auto;">
            <div style="border: 1px solid rgba(30, 27, 22, 0.1);">
                <div style="background: var(--hn-on-surface); color: var(--hn-surface); padding: 32px;">
                    <h2 class="hn-headline-md">Confirm Your Booking</h2>
                </div>
                <div style="padding: 40px;">
                    <h3 class="hn-headline-md" style="margin-bottom: 32px;" th:text="${listing.title}">Listing Title</h3>

                    <div style="margin-bottom: 32px;">
                        <h4 class="hn-label-sm" style="color: var(--hn-primary); margin-bottom: 16px;">Property Details</h4>
                        <ul style="list-style: none; padding: 0; margin: 0;">
                            <li class="hn-body-md" style="padding: 8px 0; border-bottom: 1px solid rgba(30, 27, 22, 0.1);"><strong>Location:</strong> <span th:text="${listing.city}">City</span></li>
                            <li class="hn-body-md" style="padding: 8px 0; border-bottom: 1px solid rgba(30, 27, 22, 0.1);"><strong>Property Type:</strong> <span th:text="${listing.propertyType}">Type</span></li>
                            <li class="hn-body-md" style="padding: 8px 0;"><strong>Capacity:</strong> <span th:text="${listing.capacity}">0</span> guests</li>
                        </ul>
                    </div>

                    <div style="margin-bottom: 32px;">
                        <h4 class="hn-label-sm" style="color: var(--hn-primary); margin-bottom: 16px;">Booking Details</h4>
                        <ul style="list-style: none; padding: 0; margin: 0;">
                            <li class="hn-body-md" style="padding: 8px 0; border-bottom: 1px solid rgba(30, 27, 22, 0.1);"><strong>Check-in:</strong> <span th:text="${#temporals.format(startDate, 'EEEE, MMMM d, yyyy')}">Date</span></li>
                            <li class="hn-body-md" style="padding: 8px 0; border-bottom: 1px solid rgba(30, 27, 22, 0.1);"><strong>Check-out:</strong> <span th:text="${#temporals.format(endDate, 'EEEE, MMMM d, yyyy')}">Date</span></li>
                            <li class="hn-body-md" style="padding: 8px 0;"><strong>Number of nights:</strong> <span th:text="${nights}">0</span></li>
                        </ul>
                    </div>

                    <div style="margin-bottom: 40px;">
                        <h4 class="hn-label-sm" style="color: var(--hn-primary); margin-bottom: 16px;">Price Breakdown</h4>
                        <table class="hn-table">
                            <tbody>
                                <tr>
                                    <td class="hn-body-md">PKR <span th:text="${listing.pricePerNight}">0</span> x <span th:text="${nights}">0</span> nights</td>
                                    <td class="hn-body-md" style="text-align: right; font-weight: 600;">PKR <span th:text="${totalAmount}">0</span></td>
                                </tr>
                                <tr style="border-top: 2px solid var(--hn-on-surface);">
                                    <td class="hn-body-lg" style="font-weight: 700;">Total</td>
                                    <td class="hn-body-lg" style="text-align: right; font-weight: 700;">PKR <span th:text="${totalAmount}">0</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <form method="post" th:action="@{/bookings}">
                        <input type="hidden" name="listingId" th:value="${listing.id}">
                        <input type="hidden" name="startDate" th:value="${startDate}">
                        <input type="hidden" name="endDate" th:value="${endDate}">

                        <div style="display: flex; justify-content: space-between; gap: 16px;">
                            <a th:href="@{/listings/{id}(id=${listing.id})}" class="hn-btn hn-btn-outline">Back to Listing</a>
                            <button type="submit" class="hn-btn hn-btn-primary">Confirm Booking</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:insert="fragments/footer :: footer"></div>
</body>
</html>
