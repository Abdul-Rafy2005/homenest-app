<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Listing - HomeNest</title>
    <link rel="stylesheet" href="/css/editorial.css">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="hn-container" style="padding-top: 128px; padding-bottom: 128px;">
        <div style="max-width: 720px; margin: 0 auto;">
            <h1 class="hn-headline-lg" style="margin-bottom: 48px;">Create New Listing</h1>

            <div style="border: 1px solid rgba(30, 27, 22, 0.1); padding: 48px;">
                <form method="post" action="/host/listings" th:object="${listing}" enctype="multipart/form-data">
                    <div style="margin-bottom: 32px;">
                        <label for="title" class="hn-label-sm">Title *</label>
                        <input type="text" class="hn-input" id="title" th:field="*{title}" placeholder="e.g., Cozy Apartment in Downtown" required>
                    </div>

                    <div style="margin-bottom: 32px;">
                        <label for="mainImage" class="hn-label-sm">Property Image</label>
                        <input type="file" class="hn-input" id="mainImage" name="mainImage" accept="image/*">
                    </div>

                    <div style="margin-bottom: 32px;">
                        <label for="description" class="hn-label-sm">Description</label>
                        <textarea class="hn-input" id="description" th:field="*{description}" rows="4" placeholder="Describe your property..."></textarea>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;">
                        <div>
                            <label for="city" class="hn-label-sm">City *</label>
                            <input type="text" class="hn-input" id="city" th:field="*{city}" placeholder="e.g., Karachi" required>
                        </div>
                        <div>
                            <label for="address" class="hn-label-sm">Address</label>
                            <input type="text" class="hn-input" id="address" th:field="*{address}" placeholder="Street address">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-bottom: 32px;">
                        <div>
                            <label for="propertyType" class="hn-label-sm">Property Type</label>
                            <select class="hn-input" id="propertyType" th:field="*{propertyType}">
                                <option value="">Select</option>
                                <option value="APARTMENT">Apartment</option>
                                <option value="HOUSE">House</option>
                                <option value="VILLA">Villa</option>
                                <option value="CONDO">Condo</option>
                                <option value="STUDIO">Studio</option>
                                <option value="HOSTEL">Hostel</option>
                                <option value="HOTEL">Hotel</option>
                            </select>
                        </div>
                        <div>
                            <label for="pricePerNight" class="hn-label-sm">Price per Night (PKR) *</label>
                            <input type="number" class="hn-input" id="pricePerNight" th:field="*{pricePerNight}" step="0.01" min="0" required>
                        </div>
                        <div>
                            <label for="capacity" class="hn-label-sm">Capacity (guests) *</label>
                            <input type="number" class="hn-input" id="capacity" th:field="*{capacity}" min="1" required>
                        </div>
                    </div>

                    <div style="margin-bottom: 40px;">
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" id="isPublished" th:field="*{isPublished}" style="width: 20px; height: 20px; accent-color: var(--hn-primary);">
                            <span class="hn-body-md">Publish immediately (make visible to guests)</span>
                        </label>
                    </div>

                    <div style="display: flex; justify-content: space-between; padding-top: 32px; border-top: 1px solid rgba(30, 27, 22, 0.1);">
                        <a href="/host/listings" class="hn-btn hn-btn-outline">Cancel</a>
                        <button type="submit" class="hn-btn hn-btn-primary">Create Listing</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
