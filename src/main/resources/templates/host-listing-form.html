<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Edit Listing' : 'Create Listing'} + ' - HomeNest'">Listing Form - HomeNest</title>
    <link rel="stylesheet" href="/css/editorial.css">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="hn-container" style="padding-top: 128px; padding-bottom: 128px;">
        <div style="max-width: 720px; margin: 0 auto;">
            <h1 class="hn-headline-lg" style="margin-bottom: 8px;">
                <span th:if="${isEdit}">Edit Listing</span>
                <span th:unless="${isEdit}">Create New Listing</span>
            </h1>
            <p class="hn-body-lg" style="color: var(--hn-secondary); margin-bottom: 48px;">Fill in the details about your property</p>

            <div style="border: 1px solid rgba(30, 27, 22, 0.1); padding: 48px;">
                <form th:if="${isEdit}" th:object="${listing}" method="post" th:action="@{/host/listings/{id}(id=${listing.id})}" enctype="multipart/form-data">
                    <div style="margin-bottom: 32px;">
                        <label for="title" class="hn-label-sm">Listing Title *</label>
                        <input type="text" class="hn-input" id="title" name="title" th:field="*{title}" required>
                    </div>
                    <div style="margin-bottom: 32px;">
                        <label for="mainImage" class="hn-label-sm">Property Image</label>
                        <div th:if="${listing.imageUrl}" style="margin-bottom: 16px;">
                            <img th:src="${listing.imageUrl}" alt="Current" style="max-height: 300px; width: 100%; object-fit: cover;">
                            <p class="hn-body-sm" style="color: var(--hn-secondary); margin-top: 8px;">Upload new to replace</p>
                        </div>
                        <input type="file" class="hn-input" id="mainImage" name="mainImage" accept="image/*">
                    </div>
                    <div style="margin-bottom: 32px;">
                        <label for="description" class="hn-label-sm">Description</label>
                        <textarea class="hn-input" id="description" name="description" th:field="*{description}" rows="5"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;">
                        <div>
                            <label for="city" class="hn-label-sm">City *</label>
                            <input type="text" class="hn-input" id="city" name="city" th:field="*{city}" required>
                        </div>
                        <div>
                            <label for="address" class="hn-label-sm">Address</label>
                            <input type="text" class="hn-input" id="address" name="address" th:field="*{address}">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-bottom: 32px;">
                        <div>
                            <label for="propertyType" class="hn-label-sm">Property Type</label>
                            <select class="hn-input" id="propertyType" name="propertyType" th:field="*{propertyType}">
                                <option value="">Select</option>
                                <option value="APARTMENT">Apartment</option>
                                <option value="HOUSE">House</option>
                                <option value="VILLA">Villa</option>
                                <option value="CONDO">Condo</option>
                                <option value="STUDIO">Studio</option>
                                <option value="HOSTEL">Hostel</option>
                                <option value="HOTEL">Hotel</option>
                            </select>
                        </div>
                        <div>
                            <label for="capacity" class="hn-label-sm">Capacity *</label>
                            <input type="number" class="hn-input" id="capacity" name="capacity" th:field="*{capacity}" min="1" required>
                        </div>
                        <div>
                            <label for="pricePerNight" class="hn-label-sm">Price/Night (PKR) *</label>
                            <input type="number" class="hn-input" id="pricePerNight" name="pricePerNight" th:field="*{pricePerNight}" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div style="margin-bottom: 40px;">
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" id="isPublished" name="isPublished" th:field="*{isPublished}" style="width: 20px; height: 20px; accent-color: var(--hn-primary);">
                            <span class="hn-body-md">Publish this listing</span>
                        </label>
                    </div>
                    <div style="display: flex; gap: 16px; padding-top: 32px; border-top: 1px solid rgba(30, 27, 22, 0.1);">
                        <button type="submit" class="hn-btn hn-btn-primary">Update Listing</button>
                        <a href="/host/listings" class="hn-btn hn-btn-outline">Cancel</a>
                    </div>
                </form>

                <form th:unless="${isEdit}" th:object="${listing}" method="post" th:action="@{/host/listings}" enctype="multipart/form-data">
                    <div style="margin-bottom: 32px;">
                        <label for="title" class="hn-label-sm">Listing Title *</label>
                        <input type="text" class="hn-input" id="title" name="title" th:field="*{title}" required>
                    </div>
                    <div style="margin-bottom: 32px;">
                        <label for="mainImage" class="hn-label-sm">Property Image</label>
                        <input type="file" class="hn-input" id="mainImage" name="mainImage" accept="image/*">
                    </div>
                    <div style="margin-bottom: 32px;">
                        <label for="description" class="hn-label-sm">Description</label>
                        <textarea class="hn-input" id="description" name="description" th:field="*{description}" rows="5"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;">
                        <div>
                            <label for="city" class="hn-label-sm">City *</label>
                            <input type="text" class="hn-input" id="city" name="city" th:field="*{city}" required>
                        </div>
                        <div>
                            <label for="address" class="hn-label-sm">Address</label>
                            <input type="text" class="hn-input" id="address" name="address" th:field="*{address}">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-bottom: 32px;">
                        <div>
                            <label for="propertyType" class="hn-label-sm">Property Type</label>
                            <select class="hn-input" id="propertyType" name="propertyType" th:field="*{propertyType}">
                                <option value="">Select</option>
                                <option value="APARTMENT">Apartment</option>
                                <option value="HOUSE">House</option>
                                <option value="VILLA">Villa</option>
                                <option value="CONDO">Condo</option>
                                <option value="STUDIO">Studio</option>
                                <option value="HOSTEL">Hostel</option>
                                <option value="HOTEL">Hotel</option>
                            </select>
                        </div>
                        <div>
                            <label for="capacity" class="hn-label-sm">Capacity *</label>
                            <input type="number" class="hn-input" id="capacity" name="capacity" th:field="*{capacity}" min="1" required>
                        </div>
                        <div>
                            <label for="pricePerNight" class="hn-label-sm">Price/Night (PKR) *</label>
                            <input type="number" class="hn-input" id="pricePerNight" name="pricePerNight" th:field="*{pricePerNight}" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div style="margin-bottom: 40px;">
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" id="isPublished" name="isPublished" th:field="*{isPublished}" style="width: 20px; height: 20px; accent-color: var(--hn-primary);">
                            <span class="hn-body-md">Publish this listing</span>
                        </label>
                    </div>
                    <div style="display: flex; gap: 16px; padding-top: 32px; border-top: 1px solid rgba(30, 27, 22, 0.1);">
                        <button type="submit" class="hn-btn hn-btn-primary">Create Listing</button>
                        <a href="/host/listings" class="hn-btn hn-btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
