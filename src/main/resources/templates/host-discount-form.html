<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Edit Discount' : 'Create Discount'} + ' - HomeNest'">Discount Form - HomeNest</title>
    <link rel="stylesheet" href="/css/editorial.css">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="hn-container" style="padding-top: 128px; padding-bottom: 128px;">
        <div style="max-width: 720px; margin: 0 auto;">
            <h1 class="hn-headline-lg" style="margin-bottom: 8px;">
                <span th:text="${isEdit ? 'Edit Discount' : 'Create New Discount'}">New Discount</span>
            </h1>
            <p class="hn-body-lg" style="color: var(--hn-secondary); margin-bottom: 48px;">Set up promotional offers and special deals</p>

            <div class="hn-content-card" style="padding: 48px;">
                <form th:action="${isEdit ? '/host/discounts/' + discount.id : '/host/discounts'}" method="post" th:object="${discount}">
                    <div style="margin-bottom: 32px;">
                        <label for="name" class="hn-label-sm">Discount Name *</label>
                        <input type="text" class="hn-input" id="name" name="name" th:field="*{name}" placeholder="e.g., Summer Sale, New Year Special" required>
                        <small class="hn-body-sm" style="color: var(--hn-secondary);">A name for your discount offer</small>
                    </div>

                    <div style="margin-bottom: 32px;">
                        <label for="description" class="hn-label-sm">Description</label>
                        <textarea class="hn-input" id="description" name="description" th:field="*{description}" rows="3" placeholder="e.g., Summer promotion - Save 50% on all bookings"></textarea>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr; gap: 24px; margin-bottom: 32px;">
                        <div>
                            <label for="percentage" class="hn-label-sm">Discount Percentage *</label>
                            <input type="number" class="hn-input" id="percentage" name="percentage" th:field="*{percentage}" min="0" max="100" step="0.01" placeholder="50" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;">
                        <div>
                            <label for="startDate" class="hn-label-sm">Start Date</label>
                            <input type="date" class="hn-input" id="startDate" name="startDate" th:field="*{startDate}">
                        </div>
                        <div>
                            <label for="endDate" class="hn-label-sm">End Date</label>
                            <input type="date" class="hn-input" id="endDate" name="endDate" th:field="*{endDate}">
                        </div>
                    </div>

                    <div style="margin-bottom: 32px;">
                        <label class="hn-label-sm">Apply to Properties *</label>
                        <small class="hn-body-sm" style="color: var(--hn-secondary); display: block; margin-bottom: 16px;">Select which of your properties this discount applies to</small>

                        <div th:if="${listings.isEmpty()}" class="hn-alert hn-alert-info">
                            You don't have any published properties yet. Create a property first to apply discounts.
                        </div>

                        <div th:if="${!listings.isEmpty()}" style="max-height: 300px; overflow-y: auto; border: 1px solid rgba(30, 27, 22, 0.1); padding: 16px;">
                            <div th:each="listing : ${listings}" style="margin-bottom: 16px;">
                                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                                    <input type="checkbox" th:id="'listing-' + ${listing.id}" name="selectedListings" th:value="${listing.id}" th:checked="${selectedListingIds != null && selectedListingIds.contains(listing.id)}" style="width: 20px; height: 20px; accent-color: var(--hn-primary);">
                                    <div>
                                        <strong class="hn-body-md" th:text="${listing.title}">Property Title</strong>
                                        <small class="hn-body-sm" style="color: var(--hn-secondary);" th:text="'in ' + ${listing.city}">location</small>
                                        <br>
                                        <small class="hn-body-sm" style="color: var(--hn-secondary);" th:text="'PKR ' + ${#numbers.formatDecimal(listing.pricePerNight, 1, 2)} + '/night'">price</small>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div style="margin-bottom: 40px;">
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" id="active" name="active" th:field="*{active}" style="width: 20px; height: 20px; accent-color: var(--hn-primary);">
                            <div>
                                <span class="hn-body-md" style="font-weight: 600;">Active</span>
                                <br>
                                <small class="hn-body-sm" style="color: var(--hn-secondary);">Enable this discount for guests to use</small>
                            </div>
                        </label>
                    </div>

                    <div style="display: flex; gap: 16px; padding-top: 32px; border-top: 1px solid rgba(30, 27, 22, 0.1);">
                        <button type="submit" class="hn-btn hn-btn-primary">
                            <span th:text="${isEdit ? 'Update Discount' : 'Create Discount'}">Save</span>
                        </button>
                        <a href="/host/discounts" class="hn-btn hn-btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
