<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HomeNest</title>
    <link rel="stylesheet" href="/css/editorial.css">
</head>
<body>
<div class="hn-auth-wrapper">
    <div class="hn-auth-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px;">
            <span class="hn-nav-brand" style="font-size: 24px;">HomeNest</span>
            <a class="hn-btn hn-btn-outline" href="/" style="font-size: 11px; padding: 6px 16px;">Back</a>
        </div>
        <h2 class="hn-headline-md" style="margin-bottom: 8px;">Welcome back</h2>
        <p class="hn-body-md" style="color: var(--hn-secondary); margin-bottom: 48px;">Sign in to manage your trips and bookings.</p>

        <div th:if="${param.error}" class="hn-alert hn-alert-danger">Invalid username or password.</div>
        <div th:if="${param.logout}" class="hn-alert hn-alert-info">You have been logged out.</div>
        <div th:if="${success}" class="hn-alert hn-alert-success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div style="margin-bottom: 24px;">
                <label for="username" class="hn-form-label">Username</label>
                <input type="text" class="hn-form-control" id="username" name="username" required autofocus>
            </div>
            <div style="margin-bottom: 24px;">
                <label for="password" class="hn-form-label">Password</label>
                <input type="password" class="hn-form-control" id="password" name="password" required>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input class="hn-form-check-input" type="checkbox" value="true" id="remember-me" name="remember-me">
                    <label for="remember-me" class="hn-body-md">Remember me</label>
                </div>
                <a class="hn-body-md" href="/register" style="color: var(--hn-primary); text-decoration: none;">Create account</a>
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button type="submit" class="hn-btn hn-btn-primary" style="width: 100%;">Sign in</button>
                <a class="hn-btn hn-btn-outline" href="/register" style="width: 100%; text-align: center;">Create account</a>
            </div>
        </form>
        <p class="hn-body-md" style="color: var(--hn-outline); text-align: center; margin-top: 48px;">HomeNest &copy; 2025</p>
    </div>
</div>
</body>
</html>
