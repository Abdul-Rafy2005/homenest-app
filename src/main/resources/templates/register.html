<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HomeNest</title>
    <link rel="stylesheet" href="/css/editorial.css">
</head>
<body>
<div class="hn-auth-wrapper">
    <div class="hn-auth-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px;">
            <span class="hn-nav-brand" style="font-size: 24px;">HomeNest</span>
            <a class="hn-btn hn-btn-outline" href="/" style="font-size: 11px; padding: 6px 16px;">Back</a>
        </div>
        <h2 class="hn-headline-md" style="margin-bottom: 8px;">Create your account</h2>
        <p class="hn-body-md" style="color: var(--hn-secondary); margin-bottom: 48px;">Join HomeNest to host, book, and manage stays.</p>

        <div th:if="${error}" class="hn-alert hn-alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div style="margin-bottom: 24px;">
                <label for="username" class="hn-form-label">Username</label>
                <input type="text" class="hn-form-control" id="username" name="username" th:value="${username}" required>
            </div>
            <div style="margin-bottom: 24px;">
                <label for="email" class="hn-form-label">Email</label>
                <input type="email" class="hn-form-control" id="email" name="email" th:value="${email}" required>
            </div>
            <div style="margin-bottom: 24px;">
                <label for="password" class="hn-form-label">Password</label>
                <input type="password" class="hn-form-control" id="password" name="password" required>
            </div>
            <div style="margin-bottom: 24px;">
                <label for="confirmPassword" class="hn-form-label">Confirm Password</label>
                <input type="password" class="hn-form-control" id="confirmPassword" name="confirmPassword" required>
            </div>
            <div style="margin-bottom: 32px;">
                <label class="hn-form-label" style="margin-bottom: 12px;">Account Type</label>
                <div style="border: 1px solid var(--hn-on-surface); padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input class="hn-form-check-input" type="radio" name="accountType" id="typeGuest" value="GUEST" checked required>
                        <label for="typeGuest" class="hn-body-md" style="font-weight: 600;">Guest</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input class="hn-form-check-input" type="radio" name="accountType" id="typeHost" value="HOST" required>
                        <label for="typeHost" class="hn-body-md" style="font-weight: 600;">Host</label>
                    </div>
                </div>
            </div>
            <div style="margin-bottom: 32px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input class="hn-form-check-input" type="checkbox" value="true" id="terms" required>
                    <label for="terms" class="hn-body-md">I agree to the terms</label>
                </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button type="submit" class="hn-btn hn-btn-primary" style="width: 100%;">Create account</button>
                <a class="hn-btn hn-btn-outline" href="/login" style="width: 100%; text-align: center;">Already have an account?</a>
            </div>
        </form>
        <p class="hn-body-md" style="color: var(--hn-outline); text-align: center; margin-top: 48px;">HomeNest &copy; 2025</p>
    </div>
</div>
</body>
</html>
