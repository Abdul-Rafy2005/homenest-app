<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HomeNest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --border: #e5e7eb;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(229, 231, 235, 0.5);
            box-shadow: 0 25px 60px rgba(99, 102, 241, 0.25);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
        }
        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 0.02em;
            font-size: 1.1rem;
        }
        .brand-mark i {
            font-size: 1.3rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 14px;
            border: 2px solid var(--border);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.15);
        }
        .form-label {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .input-group-text {
            border-radius: 12px;
            color: var(--text-light);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            padding: 12px 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.4);
        }
        .btn-outline-secondary {
            border-radius: 12px;
            padding: 12px;
            color: var(--text-light);
            border-color: var(--border);
            transition: all 0.3s ease;
        }
        .btn-outline-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .subtle-link {
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .subtle-link:hover { 
            color: var(--primary);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-dark);
            transform: translateX(-2px);
        }
        .form-check-input {
            border-radius: 6px;
            border-color: var(--border);
            cursor: pointer;
        }
        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .form-check-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.15);
        }
        .alert {
            border-radius: 12px;
            border: none;
        }
        .alert-danger {
            background-color: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="brand-mark"><i class="fa-solid fa-house-chimney"></i> HomeNest</div>
            <a class="back-btn" href="/">Back</a>
        </div>
        <h3 class="fw-bold mb-2">Create your account</h3>
        <p class="text-secondary mb-4">Join HomeNest to host, book, and manage stays.</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control border-start-0" id="username" name="username" th:value="${username}" required>
                </div>
                <div class="invalid-feedback">Username is required.</div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" name="email" th:value="${email}" required>
                </div>
                <div class="invalid-feedback">Valid email is required.</div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" name="password" required>
                </div>
                <div class="invalid-feedback">Password is required.</div>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="confirmPassword" name="confirmPassword" required>
                </div>
                <div class="invalid-feedback">Please confirm your password.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Account Type</label>
                <div class="border rounded p-3" style="background: rgba(99, 102, 241, 0.03);">
                    <div class="row">
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="accountType" id="typeGuest" value="GUEST" checked required>
                                <label class="form-check-label" for="typeGuest">
                                    <strong>Guest</strong>
                                </label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="accountType" id="typeHost" value="HOST" required>
                                <label class="form-check-label" for="typeHost">
                                    <strong>Host</strong>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="invalid-feedback">Please select an account type.</div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="true" id="terms" required>
                    <label class="form-check-label" for="terms">I agree to the terms</label>
                    <div class="invalid-feedback">Please accept the terms.</div>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Create account</button>
                <a class="btn btn-outline-secondary" href="/login">Already have an account?</a>
            </div>
        </form>
        <p class="text-center text-muted mt-4 mb-0">HomeNest &copy; 2025</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (() => {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
</body>
</html>
