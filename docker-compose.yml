services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: homenest
      POSTGRES_USER: homenest
      POSTGRES_PASSWORD: homenest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homenest -d homenest"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: homenest
      DB_USER: homenest
      DB_PASSWORD: homenest
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
